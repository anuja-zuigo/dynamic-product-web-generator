version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: productgen-db
    environment:
      POSTGRES_USER: productgen
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: productgen_pim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
